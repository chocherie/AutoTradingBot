# AutoTradingBot Instrument Universe
# All tickers use Yahoo Finance format

equity_index_futures:
  - ticker: "ES=F"
    name: "S&P 500 E-mini"
    exchange: CME
    multiplier: 50
    margin_pct: 5.0
    currency: USD

  - ticker: "NQ=F"
    name: "NASDAQ 100 E-mini"
    exchange: CME
    multiplier: 20
    margin_pct: 7.0
    currency: USD

  - ticker: "YM=F"
    name: "Dow Jones E-mini"
    exchange: CBOT
    multiplier: 5
    margin_pct: 5.0
    currency: USD

  - ticker: "NIY=F"
    name: "Nikkei 225 (USD)"
